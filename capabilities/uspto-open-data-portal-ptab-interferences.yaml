naftiko: 1.0.0-alpha2
info:
  label: USPTO Open Data Portal API — PTAB Interferences
  description: 'USPTO Open Data Portal API — PTAB Interferences. 3 operations. Lead operation: Search PTAB Interference Decisions
    by JSON Payload. Self-contained Naftiko capability covering one Us Patent And Trademark Office business surface.'
  tags:
  - Us Patent And Trademark Office
  - PTAB Interferences
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    US_PATENT_AND_TRADEMARK_OFFICE_API_KEY: US_PATENT_AND_TRADEMARK_OFFICE_API_KEY
capability:
  consumes:
  - type: http
    namespace: uspto-open-data-portal-ptab-interferences
    baseUri: https://api.uspto.gov
    description: USPTO Open Data Portal API — PTAB Interferences business capability. Self-contained, no shared references.
    resources:
    - name: api-v1-patent-interferences-decisions-search
      path: /api/v1/patent/interferences/decisions/search
      operations:
      - name: searchptabinterferencedecisionspost
        method: POST
        description: Search PTAB Interference Decisions by JSON Payload
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
      - name: searchptabinterferencedecisionsget
        method: GET
        description: Search PTAB Interference Decisions by Query Parameters
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: q
          in: query
          type: string
        - name: start
          in: query
          type: integer
        - name: rows
          in: query
          type: integer
    - name: api-v1-patent-interferences-decisions-documentIdentifier
      path: /api/v1/patent/interferences/decisions/{documentIdentifier}
      operations:
      - name: getptabinterferencedecision
        method: GET
        description: Get PTAB Interference Decision by Document Identifier
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: documentIdentifier
          in: path
          type: string
          required: true
    authentication:
      type: apikey
      key: X-API-KEY
      value: '{{env.US_PATENT_AND_TRADEMARK_OFFICE_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: uspto-open-data-portal-ptab-interferences-rest
    port: 8080
    description: REST adapter for USPTO Open Data Portal API — PTAB Interferences. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/api/v1/patent/interferences/decisions/search
      name: api-v1-patent-interferences-decisions-search
      description: REST surface for api-v1-patent-interferences-decisions-search.
      operations:
      - method: POST
        name: searchptabinterferencedecisionspost
        description: Search PTAB Interference Decisions by JSON Payload
        call: uspto-open-data-portal-ptab-interferences.searchptabinterferencedecisionspost
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
      - method: GET
        name: searchptabinterferencedecisionsget
        description: Search PTAB Interference Decisions by Query Parameters
        call: uspto-open-data-portal-ptab-interferences.searchptabinterferencedecisionsget
        with:
          q: rest.q
          start: rest.start
          rows: rest.rows
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/api/v1/patent/interferences/decisions/{documentidentifier}
      name: api-v1-patent-interferences-decisions-documentidentifier
      description: REST surface for api-v1-patent-interferences-decisions-documentIdentifier.
      operations:
      - method: GET
        name: getptabinterferencedecision
        description: Get PTAB Interference Decision by Document Identifier
        call: uspto-open-data-portal-ptab-interferences.getptabinterferencedecision
        with:
          documentIdentifier: rest.documentIdentifier
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: uspto-open-data-portal-ptab-interferences-mcp
    port: 9090
    transport: http
    description: MCP adapter for USPTO Open Data Portal API — PTAB Interferences. One tool per consumed operation, routed
      inline through this capability's consumes block.
    tools:
    - name: search-ptab-interference-decisions-json
      description: Search PTAB Interference Decisions by JSON Payload
      hints:
        readOnly: true
        destructive: false
        idempotent: false
      call: uspto-open-data-portal-ptab-interferences.searchptabinterferencedecisionspost
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: search-ptab-interference-decisions-query
      description: Search PTAB Interference Decisions by Query Parameters
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: uspto-open-data-portal-ptab-interferences.searchptabinterferencedecisionsget
      with:
        q: tools.q
        start: tools.start
        rows: tools.rows
      outputParameters:
      - type: object
        mapping: $.
    - name: get-ptab-interference-decision-document
      description: Get PTAB Interference Decision by Document Identifier
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: uspto-open-data-portal-ptab-interferences.getptabinterferencedecision
      with:
        documentIdentifier: tools.documentIdentifier
      outputParameters:
      - type: object
        mapping: $.
