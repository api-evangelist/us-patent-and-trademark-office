      - name: getpatentapplication
        method: GET
        description: Get Patent Application by Application Number
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: applicationNumberText
          in: path
          type: string
          description: Patent application number (e.g., 14412875)
