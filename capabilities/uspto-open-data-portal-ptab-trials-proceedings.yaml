naftiko: 1.0.0-alpha2
info:
  label: USPTO Open Data Portal API — PTAB Trials Proceedings
  description: 'USPTO Open Data Portal API — PTAB Trials Proceedings. 3 operations. Lead operation: Search PTAB Trial Proceedings
    by JSON Payload. Self-contained Naftiko capability covering one Us Patent And Trademark Office business surface.'
  tags:
  - Us Patent And Trademark Office
  - PTAB Trials Proceedings
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    US_PATENT_AND_TRADEMARK_OFFICE_API_KEY: US_PATENT_AND_TRADEMARK_OFFICE_API_KEY
capability:
  consumes:
  - type: http
    namespace: uspto-open-data-portal-ptab-trials-proceedings
    baseUri: https://api.uspto.gov
    description: USPTO Open Data Portal API — PTAB Trials Proceedings business capability. Self-contained, no shared references.
    resources:
    - name: api-v1-patent-trials-proceedings-search
      path: /api/v1/patent/trials/proceedings/search
      operations:
      - name: searchptabproceedingspost
        method: POST
        description: Search PTAB Trial Proceedings by JSON Payload
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
      - name: searchptabproceedingsget
        method: GET
        description: Search PTAB Trial Proceedings by Query Parameters
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: q
          in: query
          type: string
        - name: start
          in: query
          type: integer
        - name: rows
          in: query
          type: integer
    - name: api-v1-patent-trials-proceedings-trialNumber
      path: /api/v1/patent/trials/proceedings/{trialNumber}
      operations:
      - name: getptabproceeding
        method: GET
        description: Get PTAB Trial Proceeding by Trial Number
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: trialNumber
          in: path
          type: string
          description: PTAB trial number (e.g., IPR2020-00001)
          required: true
    authentication:
      type: apikey
      key: X-API-KEY
      value: '{{env.US_PATENT_AND_TRADEMARK_OFFICE_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: uspto-open-data-portal-ptab-trials-proceedings-rest
    port: 8080
    description: REST adapter for USPTO Open Data Portal API — PTAB Trials Proceedings. One Spectral-compliant resource per
      consumed operation, prefixed with /v1.
    resources:
    - path: /v1/api/v1/patent/trials/proceedings/search
      name: api-v1-patent-trials-proceedings-search
      description: REST surface for api-v1-patent-trials-proceedings-search.
      operations:
      - method: POST
        name: searchptabproceedingspost
        description: Search PTAB Trial Proceedings by JSON Payload
        call: uspto-open-data-portal-ptab-trials-proceedings.searchptabproceedingspost
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
      - method: GET
        name: searchptabproceedingsget
        description: Search PTAB Trial Proceedings by Query Parameters
        call: uspto-open-data-portal-ptab-trials-proceedings.searchptabproceedingsget
        with:
          q: rest.q
          start: rest.start
          rows: rest.rows
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/api/v1/patent/trials/proceedings/{trialnumber}
      name: api-v1-patent-trials-proceedings-trialnumber
      description: REST surface for api-v1-patent-trials-proceedings-trialNumber.
      operations:
      - method: GET
        name: getptabproceeding
        description: Get PTAB Trial Proceeding by Trial Number
        call: uspto-open-data-portal-ptab-trials-proceedings.getptabproceeding
        with:
          trialNumber: rest.trialNumber
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: uspto-open-data-portal-ptab-trials-proceedings-mcp
    port: 9090
    transport: http
    description: MCP adapter for USPTO Open Data Portal API — PTAB Trials Proceedings. One tool per consumed operation, routed
      inline through this capability's consumes block.
    tools:
    - name: search-ptab-trial-proceedings-json
      description: Search PTAB Trial Proceedings by JSON Payload
      hints:
        readOnly: true
        destructive: false
        idempotent: false
      call: uspto-open-data-portal-ptab-trials-proceedings.searchptabproceedingspost
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: search-ptab-trial-proceedings-query
      description: Search PTAB Trial Proceedings by Query Parameters
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: uspto-open-data-portal-ptab-trials-proceedings.searchptabproceedingsget
      with:
        q: tools.q
        start: tools.start
        rows: tools.rows
      outputParameters:
      - type: object
        mapping: $.
    - name: get-ptab-trial-proceeding-trial
      description: Get PTAB Trial Proceeding by Trial Number
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: uspto-open-data-portal-ptab-trials-proceedings.getptabproceeding
      with:
        trialNumber: tools.trialNumber
      outputParameters:
      - type: object
        mapping: $.
