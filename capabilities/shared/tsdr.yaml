naftiko: "1.0.0-alpha1"

info:
  label: "USPTO Trademark Status and Document Retrieval API"
  description: >-
    The USPTO TSDR API provides programmatic access to trademark case status,
    documents, images, and metadata for registered and pending trademarks.
  tags:
    - Trademarks
    - Intellectual Property
    - Federal Government
  created: "2026-05-03"
  modified: "2026-05-03"

binds:
  - namespace: env
    keys:
      USPTO_TSDR_API_KEY: USPTO_TSDR_API_KEY

capability:
  consumes:
    - type: http
      namespace: uspto-tsdr
      baseUri: https://tsdrapi.uspto.gov
      description: "USPTO TSDR REST API for trademark case status and documents."
      authentication:
        type: apikey
        key: USPTO-API-KEY
        value: "{{USPTO_TSDR_API_KEY}}"
        placement: header
      resources:
        - name: case-status
          path: /ts/cd/caseMultiStatus/{type}
          description: "Retrieve status for multiple trademark cases"
          operations:
            - name: get-trademark-case-status
              method: GET
              description: "Get status for one or more trademark cases by serial or registration number"
              inputParameters:
                - name: type
                  in: path
                  type: string
                  required: true
                  description: "Response format (json or xml)"
                - name: sn
                  in: query
                  type: string
                  required: false
                  description: "Serial numbers (comma-separated)"
                - name: rn
                  in: query
                  type: string
                  required: false
                  description: "Registration numbers (comma-separated)"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: case-documents
          path: /ts/cd/casedocs/{caseid}
          description: "Trademark case document access"
          operations:
            - name: get-case-document-list
              method: GET
              description: "Get list of documents for a trademark case"
              inputParameters:
                - name: caseid
                  in: path
                  type: string
                  required: true
                  description: "Trademark serial or registration number"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      port: 8101
      namespace: uspto-tsdr-api
      resources:
        - path: /v1/trademarks/{caseId}/status
          name: trademark-status
          description: "Trademark case status"
          operations:
            - method: GET
              name: get-trademark-status
              description: "Get trademark case status"
              call: "uspto-tsdr.get-trademark-case-status"
              with:
                type: "json"
                sn: "rest.caseId"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/trademarks/{caseId}/documents
          name: trademark-documents
          description: "Trademark case documents"
          operations:
            - method: GET
              name: list-trademark-documents
              description: "List documents for a trademark case"
              call: "uspto-tsdr.get-case-document-list"
              with:
                caseid: "rest.caseId"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9101
      namespace: uspto-tsdr-mcp
      transport: http
      tools:
        - name: get-trademark-status
          description: "Get the current status of a trademark application or registration"
          hints:
            readOnly: true
            openWorld: false
          call: "uspto-tsdr.get-trademark-case-status"
          with:
            type: "json"
            sn: "tools.serialNumber"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-trademark-documents
          description: "List all documents filed for a trademark case"
          hints:
            readOnly: true
            openWorld: false
          call: "uspto-tsdr.get-case-document-list"
          with:
            caseid: "tools.caseId"
          outputParameters:
            - type: object
              mapping: "$."
