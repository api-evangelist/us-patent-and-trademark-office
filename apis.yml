position: Consuming
description: >-
  The US Patent and Trademark Office (USPTO) is responsible for granting patents and registering trademarks to protect
  intellectual property in the United States. The USPTO examines patent applications to determine if an invention is
  new, non-obvious, and useful, and grants patents to those that meet the criteria. They also register trademarks, which
  are words, phrases, symbols, or designs that distinguish goods or services of one entity from another. The USPTO Open
  Data Portal provides free programmatic access to patent applications, PTAB trial proceedings, petition decisions,
  trademark status, and bulk datasets.
features:
  - Patent Application Search
  - Patent File Wrapper Access
  - PTAB Trial Proceedings Search
  - Petition Decision Search
  - Trademark Status Retrieval
  - Trademark Document Retrieval
  - Bulk Dataset Downloads
useCases:
