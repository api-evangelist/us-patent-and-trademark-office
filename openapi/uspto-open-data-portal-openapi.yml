openapi: 3.0.1
info:
  title: USPTO Open Data Portal API
  description: >-
    The USPTO Open Data Portal (ODP) API allows public users to discover,
    search, and extract USPTO patent, trademark, PTAB trial, petition decision,
    and bulk dataset data at no cost. An ODP API key is required, passed via
    the X-API-KEY request header.
  version: 1.0.0
  contact:
    name: USPTO
    email: data@uspto.gov
    url: https://data.uspto.gov/apis/getting-started
  x-source-url: https://data.uspto.gov/swagger/swagger.yaml
servers:
  - url: https://api.uspto.gov
security:
  - ApiKeyAuth: []
tags:
  - name: Patent Search
    description: Search and retrieve patent application data
  - name: Bulk Datasets
    description: Access bulk raw public data from the Chief Economist office
  - name: Petition Decisions
    description: Search and retrieve petition decision records
  - name: PTAB Trials Proceedings
    description: All public PTAB Trial proceedings
  - name: PTAB Trials Decisions
    description: All public decisions filed in PTAB Trials
  - name: PTAB Trials Documents
    description: All public documents filed in PTAB Trials
  - name: PTAB Appeals
    description: All public decisions filed in PTAB Appeals
  - name: PTAB Interferences
    description: All public decisions filed in PTAB Interferences
paths:
  /api/v1/patent/applications/search:
    post:
      tags:
        - Patent Search
      operationId: searchPatentApplicationsPost
      summary: Search Patent Applications by JSON Payload
      description: >-
        Search patent applications by supplying a JSON request payload with
        optional query fields, date filters, and pagination options.
      requestBody:
        description: Patent search request payload. All fields are optional.
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatentSearchRequest'
      responses:
        '200':
          description: Successful patent search response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PatentDataResponse'
        '400':
          description: Bad Request
        '403':
          description: Forbidden
        '404':
          description: Not Found
        '500':
          description: Internal Server Error
    get:
      tags:
        - Patent Search
      operationId: searchPatentApplicationsGet
      summary: Search Patent Applications by Query Parameters
      description: >-
        Search patent applications using query parameters. When no parameters
        are supplied, the top 25 applications are returned.
      parameters:
        - name: q
          in: query
          description: >-
            Search query string supporting boolean operators (AND, OR, NOT),
            wildcards (*), and exact phrases ("").
          schema:
            type: string
        - name: dateRangeData.startDate
          in: query
          description: Start date for date range filter (YYYY-MM-DD)
          schema:
            type: string
            format: date
        - name: dateRangeData.endDate
          in: query
          description: End date for date range filter (YYYY-MM-DD)
          schema:
            type: string
            format: date
        - name: start
          in: query
          description: Pagination start offset
          schema:
            type: integer
            default: 0
        - name: rows
          in: query
          description: Number of rows to return (max 25)
          schema:
            type: integer
            default: 25
            maximum: 25
      responses:
        '200':
          description: Successful patent search response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PatentDataResponse'
        '400':
          description: Bad Request
        '403':
          description: Forbidden
        '404':
          description: Not Found
        '500':
          description: Internal Server Error
  /api/v1/patent/applications/search/download:
    post:
      tags:
        - Patent Search
      operationId: downloadPatentApplicationsSearch
      summary: Download Patent Application Search Results
      description: Download a bulk export of patent application search results.
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatentSearchRequest'
      responses:
        '200':
          description: Download initiated
        '400':
          description: Bad Request
        '403':
          description: Forbidden
  /api/v1/patent/applications/{applicationNumberText}:
    get:
      tags:
        - Patent Search
      operationId: getPatentApplication
      summary: Get Patent Application by Application Number
      description: Retrieve full details for a specific patent application.
      parameters:
        - name: applicationNumberText
          in: path
          required: true
          description: Patent application number (e.g., 14412875)
          schema:
            type: string
      responses:
        '200':
          description: Patent application details
          content:
            application/json:
              schema:
